services:
  mongo:
    image: mongo:latest
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password123}
    ports:
      - '27017:27017'
    volumes:
      - ./data/mongo:/data/db

  mongo-express:
    image: mongo-express:latest
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      ME_CONFIG_BASICAUTH: false
      ME_CONFIG_MONGODB_ENABLE_ADMIN: true
      ME_CONFIG_MONGODB_AUTH_DATABASE: admin
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-password123}
      ME_CONFIG_MONGODB_SERVER: mongo
    ports:
      - '127.0.0.1:9000:8081'

  app:
    build:
      dockerfile: ./Dockerfile
      context: ./.
      args:
        DATABASE_URL: ${DATABASE_URL_BUILD:-mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-password123}@host.docker.internal:27017/sensory_minds?authSource=admin}
      extra_hosts:
        - 'host.docker.internal:host-gateway'
    depends_on:
      - mongo
    ports:
      - '13005:3000'
    env_file:
      - ./.env
    restart: always
    stdin_open: true
